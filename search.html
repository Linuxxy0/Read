<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>静读 · 全站搜索</title>
  <meta name="description" content="静读，一个适合 GitHub Pages 部署的现代阅读网站演示项目，支持全站搜索、作品内搜索、动态标签和日夜主题切换。" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body data-page="search">
  <div class="page-shell">
    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="静读首页">
          <div class="brand-mark">静</div>
          <div class="brand-copy">
            <small>Read in Quiet</small>
            <strong>静读</strong>
          </div>
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html" data-nav="home">首页</a>
          <a href="./library.html" data-nav="library">著作</a>
          <a href="./authors.html" data-nav="authors">作者</a>
          <a href="./categories.html" data-nav="categories">分类</a>
          <a href="./about.html" data-nav="about">关于</a>
        </nav>
        <div class="header-actions">
          <a class="inline-button" href="./search.html">全站搜索</a>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span>◐</span>
            <span data-theme-label>切换夜间</span>
          </button>
        </div>
      </div>
    </header>
    
<main class="section">
  <div class="container search-page-layout">
    <div class="section-header">
      <div>
        <div class="section-kicker">Search</div>
        <h1 class="section-title">全站搜索</h1>
        <p class="page-intro" data-search-count></p>
      </div>
    </div>
    <section class="glass-panel">
      <form class="search-box" data-search-page-form>
        <input type="search" placeholder="搜索书名、作者、标签、章节或正文关键词……" data-search-page-input />
        <button class="search-submit primary-button" type="submit">搜索</button>
      </form>
      <div class="filter-chip-wrap" style="margin-top:14px;">
        <button class="filter-chip active" type="button" data-result-filter="all">全部</button>
        <button class="filter-chip" type="button" data-result-filter="book">著作</button>
        <button class="filter-chip" type="button" data-result-filter="chapter">章节</button>
        <button class="filter-chip" type="button" data-result-filter="content">正文</button>
      </div>
    </section>
    <section class="library-results" data-search-results></section>
  </div>
</main>

  </div>
  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <strong>静读 · GitHub Pages 阅读项目</strong>
        <div class="muted" style="margin-top:8px;">支持首页、书架页、作者页、分类页、全站搜索、作品内搜索，以及白天 / 夜间主题切换。</div>
      </div>
      <div class="footer-links">
        <a href="./index.html">首页</a>
        <a href="./library.html">著作</a>
        <a href="./search.html">搜索</a>
        <a href="./about.html">关于</a>
      </div>
    </div>
  </footer>
  <script src="./assets/js/books-data.js"></script>
  <script src="./assets/js/site.js"></script>
  <script src="./assets/js/search.js"></script>
</body>
</html>
