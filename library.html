<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>静读 · 著作书架</title>
  <meta name="description" content="静读，一个适合 GitHub Pages 部署的现代阅读网站演示项目，支持全站搜索、作品内搜索、动态标签和日夜主题切换。" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body data-page="library">
  <div class="page-shell">
    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="静读首页">
          <div class="brand-mark">静</div>
          <div class="brand-copy">
            <small>Read in Quiet</small>
            <strong>静读</strong>
          </div>
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html" data-nav="home">首页</a>
          <a href="./library.html" data-nav="library">著作</a>
          <a href="./authors.html" data-nav="authors">作者</a>
          <a href="./categories.html" data-nav="categories">分类</a>
          <a href="./about.html" data-nav="about">关于</a>
        </nav>
        <div class="header-actions">
          <a class="inline-button" href="./search.html">全站搜索</a>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span>◐</span>
            <span data-theme-label>切换夜间</span>
          </button>
        </div>
      </div>
    </header>

    <main class="section library-page">
      <div class="container">
        <div class="section-header library-header">
          <div class="library-heading">
            <div class="section-kicker">Library</div>
            <h1 class="section-title">著作 / 书架页</h1>
            <p class="page-intro" data-library-summary></p>
          </div>

          <div class="library-command" data-library-command>
            <div class="library-searchbar">
              <span class="library-search-icon" aria-hidden="true">⌕</span>
              <input type="search" placeholder="搜索书名、作者、标签、简介……" data-filter-search />
              <button class="select-chip" type="button" data-filter-panel-toggle aria-expanded="false">详细筛选</button>
              <button class="inline-button" type="button" data-clear-filters>清空</button>
            </div>

            <div class="dropdown-panel library-filter-panel hidden" data-filter-panel>
              <div class="library-filter-grid">
                <label class="library-filter-item">
                  <span>分类</span>
                  <select class="filter-select" data-filter-category></select>
                </label>
                <label class="library-filter-item">
                  <span>作者</span>
                  <select class="filter-select" data-filter-author></select>
                </label>
                <label class="library-filter-item">
                  <span>排序</span>
                  <select class="filter-select" data-filter-sort>
                    <option value="title">按书名排序</option>
                    <option value="words">按收录字数排序</option>
                    <option value="author">按作者排序</option>
                    <option value="chapters">按节选数量排序</option>
                  </select>
                </label>
                <div class="library-filter-item library-checkbox-item">
                  <span>内容范围</span>
                  <label class="meta-pill library-featured-pill">
                    <input type="checkbox" data-filter-featured />
                    只看精选著作
                  </label>
                </div>
              </div>

              <div class="library-toolbar-row">
                <div>
                  <div class="library-filter-label">标签筛选</div>
                  <div class="filter-chip-wrap" data-tag-chips></div>
                </div>
              </div>

              <div class="library-toolbar-row library-toolbar-bottom">
                <div>
                  <div class="library-filter-label">快速分类</div>
                  <div class="tag-list" data-category-chips></div>
                </div>
                <div class="view-toggle library-view-toggle">
                  <button type="button" data-view="grid">网格视图</button>
                  <button type="button" data-view="list">列表视图</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <section class="library-results-wrapper" data-library-container>
          <div class="section-actions library-results-head">
            <div class="muted" data-library-count></div>
            <a class="inline-button" href="./categories.html">浏览分类与标签</a>
          </div>
          <div class="library-results" data-library-results></div>
        </section>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <strong>静读 · GitHub Pages 阅读项目</strong>
        <div class="muted footer-note">支持首页、书架页、作者页、分类页、全站搜索、作品内搜索，以及白天 / 夜间主题切换。</div>
      </div>
      <div class="footer-links">
        <a href="./index.html">首页</a>
        <a href="./library.html">著作</a>
        <a href="./search.html">搜索</a>
        <a href="./about.html">关于</a>
      </div>
    </div>
  </footer>
  <script src="./assets/js/books-data.js"></script>
  <script src="./assets/js/site.js"></script>
  <script src="./assets/js/library.js"></script>
</body>
</html>
