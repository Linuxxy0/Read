<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>静读 · 阅读页</title>
  <meta name="description" content="静读，一个适合 GitHub Pages 部署的现代阅读网站演示项目，支持全站搜索、作品内搜索、动态标签和日夜主题切换。" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body data-page="book">
  <div class="page-shell">
    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="静读首页">
          <div class="brand-mark">静</div>
          <div class="brand-copy">
            <small>Read in Quiet</small>
            <strong>静读</strong>
          </div>
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html" data-nav="home">首页</a>
          <a href="./library.html" data-nav="library">著作</a>
          <a href="./authors.html" data-nav="authors">作者</a>
          <a href="./categories.html" data-nav="categories">分类</a>
          <a href="./about.html" data-nav="about">关于</a>
        </nav>
        <div class="header-actions">
          <a class="inline-button" href="./search.html">全站搜索</a>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span>◐</span>
            <span data-theme-label>切换夜间</span>
          </button>
        </div>
      </div>
    </header>
    
<main class="section">
  <div class="container reading-layout">
    <aside class="sticky-panel sidebar-card">
      <h3 id="toc">章节目录</h3>
      <div class="toc" data-book-toc></div>
    </aside>

    <section class="reading-main">
      <article class="book-hero card">
        <div class="tag-list">
          <span class="meta-pill" data-book-category></span>
          <span class="meta-pill" data-book-words></span>
          <span class="meta-pill" data-book-chapter-count></span>
        </div>
        <h1 data-book-title></h1>
        <div class="page-intro" style="margin-top:12px;" data-book-author></div>
        <p class="page-intro" data-book-summary></p>
        <p class="section-copy" data-book-description></p>
        <div class="tag-list" data-book-tags></div>
      </article>
      <section data-book-chapters></section>
    </section>

    <aside class="sticky-panel sidebar-stack">
      <section class="sidebar-card">
        <h3>作品内搜索</h3>
        <form class="search-box" data-book-search-form>
          <input type="search" placeholder="搜索当前著作中的关键词……" data-book-search-input />
          <button class="search-submit primary-button" type="submit">检索</button>
        </form>
        <div class="reading-actions" style="margin-top:12px;">
          <button class="inline-button" type="button" data-book-search-prev>上一个</button>
          <button class="inline-button" type="button" data-book-search-next>下一个</button>
        </div>
        <p class="muted" style="margin-top:12px;" data-book-search-count></p>
        <div class="book-search-results" data-book-search-results></div>
      </section>
      <section class="sidebar-card">
        <h3>阅读设置</h3>
        <div class="reader-settings">
          <div class="reader-control">
            <label class="reader-control-head" for="reader-font-family">
              <span>字体</span>
              <strong data-reader-font-family-label>宋体阅读</strong>
            </label>
            <select class="reader-select" id="reader-font-family" data-reader-font-family>
              <option value="serif">宋体阅读</option>
              <option value="sans">无衬线</option>
              <option value="kai">楷体风格</option>
            </select>
          </div>

          <div class="reader-control">
            <label class="reader-control-head" for="reader-font-size">
              <span>字号</span>
              <strong data-reader-font-size-value>18px</strong>
            </label>
            <input class="reader-range" id="reader-font-size" type="range" min="16" max="28" step="1" value="18" data-reader-font-size />
          </div>

          <div class="reader-control">
            <label class="reader-control-head" for="reader-line-height">
              <span>行间距</span>
              <strong data-reader-line-height-value>2.0</strong>
            </label>
            <input class="reader-range" id="reader-line-height" type="range" min="1.6" max="2.8" step="0.05" value="2" data-reader-line-height />
          </div>

          <div class="reader-control">
            <label class="reader-control-head" for="reader-paragraph-gap">
              <span>段间距</span>
              <strong data-reader-paragraph-gap-value>1.1em</strong>
            </label>
            <input class="reader-range" id="reader-paragraph-gap" type="range" min="0.6" max="2.4" step="0.1" value="1.1" data-reader-paragraph-gap />
          </div>

          <div class="reader-control">
            <label class="reader-control-head" for="reader-side-gap">
              <span>左右留白</span>
              <strong data-reader-side-gap-value>44px</strong>
            </label>
            <input class="reader-range" id="reader-side-gap" type="range" min="20" max="96" step="4" value="44" data-reader-side-gap />
          </div>

          <div class="reading-actions">
            <button class="inline-button" type="button" data-reader-reset>恢复默认</button>
            <button class="inline-button" type="button" data-theme-toggle><span data-theme-label>切换夜间</span></button>
          </div>
        </div>
        <p class="section-copy reading-panel-copy">支持字体、字号、段间距、行间距和左右留白设置，阅读偏好会自动保存在当前浏览器中。</p>
      </section>
    </aside>
  </div>
</main>

  </div>
  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <strong>静读 · GitHub Pages 阅读项目</strong>
        <div class="muted" style="margin-top:8px;">支持首页、书架页、作者页、分类页、全站搜索、作品内搜索，以及白天 / 夜间主题切换。</div>
      </div>
      <div class="footer-links">
        <a href="./index.html">首页</a>
        <a href="./library.html">著作</a>
        <a href="./search.html">搜索</a>
        <a href="./about.html">关于</a>
      </div>
    </div>
  </footer>
  <script src="./assets/js/books-data.js"></script>
  <script src="./assets/js/site.js"></script>
  <script src="./assets/js/book.js"></script>
</body>
</html>
